<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Đặt Hàng Nâng Cao</title>
    <link rel="stylesheet" href="style-order.css">
</head>
<body>

<div class="container">
    <form id="orderForm">
        <h2>Đặt Hàng Trực Tuyến</h2>
        
        <div class="form-group">
            <label for="product">Sản phẩm</label>
            <select id="product">
                <option value="">-- Chọn sản phẩm --</option>
                <option value="ao">Áo thun nam (150.000đ)</option>
                <option value="quan">Quần Jeans (300.000đ)</option>
                <option value="giay">Giày Sneaker (500.000đ)</option>
            </select>
            <span class="error-msg" id="productError"></span>
        </div>

        <div class="form-group">
            <label for="quantity">Số lượng</label>
            <input type="number" id="quantity" min="1" max="99" placeholder="1 - 99">
            <span class="error-msg" id="quantityError"></span>
        </div>

        <div class="form-group">
            <label>Tổng tiền tạm tính:</label>
            <div class="total-price" id="totalPrice">0 VNĐ</div>
        </div>

        <div class="form-group">
            <label for="deliveryDate">Ngày giao hàng</label>
            <input type="date" id="deliveryDate">
            <span class="error-msg" id="deliveryDateError"></span>
        </div>

        <div class="form-group">
            <label for="address">Địa chỉ giao hàng</label>
            <input type="text" id="address" placeholder="Nhập địa chỉ chi tiết (≥ 10 ký tự)">
            <span class="error-msg" id="addressError"></span>
        </div>

        <div class="form-group">
            <label for="note">Ghi chú <span id="noteCount" class="char-count">0/200</span></label>
            <textarea id="note" rows="3" placeholder="Ghi chú thêm (không bắt buộc)"></textarea>
            <span class="error-msg" id="noteError"></span>
        </div>

        <div class="form-group">
            <label>Phương thức thanh toán</label>
            <div class="radio-group">
                <input type="radio" name="payment" id="cod" value="COD"> <label for="cod">COD</label>
                <input type="radio" name="payment" id="transfer" value="Chuyển khoản"> <label for="transfer">Chuyển khoản</label>
                <input type="radio" name="payment" id="wallet" value="Ví điện tử"> <label for="wallet">Ví điện tử</label>
            </div>
            <span class="error-msg" id="paymentError"></span>
        </div>

        <button type="submit" id="btnSubmit">Tạo Đơn Hàng</button>
    </form>

    <div id="confirmBox" class="hidden">
        <h3>Xác nhận đặt hàng?</h3>
        <ul id="summaryList"></ul>
        <div class="btn-group">
            <button id="btnCancel" class="btn-secondary">Hủy</button>
            <button id="btnConfirm" class="btn-primary">Xác nhận</button>
        </div>
    </div>

    <div id="successMessage" class="hidden">
        <h3>🎉 Đặt hàng thành công!</h3>
        <p>Cảm ơn bạn đã mua sắm.</p>
    </div>
</div>

<script src="script-order.js"></script>
</body>
</html>
