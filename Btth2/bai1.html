<!DOCTYPE html>
<html lang="vi">
<head>
  <meta name="description" content="sinh vien thuy loi"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title> Day la web moi </title> 
  <link rel="icon" href="huythuy.png">
  <link rel="stylesheet" href="bai1.css">
</head>
<body>
    <header>
    </header>
    <main class="form-wrapper">
        <form action="#" method="post">
            <h2 class="form-heading">Get in touch with us by filling contact form below</h2>
            
            <section class="input-row">
                <input type="text" name="fullname" placeholder="* Enter your full name" required aria-label="Full Name">
                <input type="email" name="email" placeholder="* Enter your email address" required aria-label="Email Address">
            </section>

            <section class="input-row">
                <input type="text" name="subject" placeholder="Enter your subject" class="full-width" aria-label="Subject">
            </section>

            <section class="input-row">
                <textarea name="message" placeholder="* Your message here..." required aria-label="Message"></textarea>
            </section>

            <footer class="form-footer">
                <button type="submit" class="btn-submit">Send message</button>
                <small class="helper-text">* Please fill all required form field, thanks!</small>
            </footer>
        </form>
    </main>
</body>
</html>
